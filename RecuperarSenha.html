<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Senha - Sinaly</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,sans-serif;
}

body{
background:#eef1f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}



.recuperar-container{
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
width:100%;
max-width:420px;
}



.recuperar-header{
background:linear-gradient(90deg,#3498db,#2980b9);
color:white;
padding:18px;
border-radius:10px 10px 0 0;
text-align:center;
margin:-35px -35px 25px -35px;
font-size:20px;
font-weight:bold;
}



label{
font-weight:600;
color:#2c3e50;
font-size:14px;
}



input,select{
width:100%;
padding:11px;
margin-top:6px;
margin-bottom:14px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
transition:0.2s;
}

input:focus,select:focus{
border-color:#3498db;
outline:none;
box-shadow:0 0 4px rgba(52,152,219,0.4);
}

/* BOTÃO PRINCIPAL */

button{
width:100%;
padding:12px;
background:#3498db;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2980b9;
}



#reenviarBtn{
margin-top:5px;
background:#2c3e50;
}

#reenviarBtn:hover{
background:#1a252f;
}

#reenviarBtn:disabled{
background:#ccc;
cursor:not-allowed;
}



.mensagem{
text-align:center;
margin-top:10px;
font-size:14px;
}



a{
display:block;
text-align:center;
margin-top:18px;
text-decoration:none;
color:#3498db;
font-size:14px;
}

a:hover{
text-decoration:underline;
}



.hidden{
display:none;
}

</style>
</head>

<body>

<div class="recuperar-container">

<div class="recuperar-header">
Recuperar Senha
</div>

<form id="recuperarForm">

<label>Selecione o método de recuperação:</label>
<select id="metodo" required>
<option value="">Selecione</option>
<option value="email">E-mail</option>
<option value="sms">SMS</option>
</select>

<div id="campoEmail" class="hidden">
<label>E-mail:</label>
<input type="email" id="email" placeholder="usuario@dominio.com">
</div>

<div id="campoSMS" class="hidden">
<label>Número de telefone:</label>
<input type="text" id="telefone" maxlength="15" placeholder="(XX) XXXXX-XXXX">
</div>

<div id="campoToken" class="hidden">
<label>Token de Segurança:</label>
<input type="text" id="token" maxlength="6" placeholder="Ex: 123456">
<button type="button" id="reenviarBtn" class="hidden">Reenviar código</button>
</div>

<div id="campoNovaSenha" class="hidden">
<label>Nova Senha:</label>
<input type="password" id="novaSenha" minlength="8" placeholder="Digite a nova senha">
</div>

<button type="submit">Recuperar Senha</button>

<div class="mensagem" id="mensagem"></div>

</form>

<a href="Login.html">Voltar ao Login</a>

</div>

<script>

const metodo=document.getElementById("metodo");
const campoEmail=document.getElementById("campoEmail");
const campoSMS=document.getElementById("campoSMS");
const campoToken=document.getElementById("campoToken");
const campoNovaSenha=document.getElementById("campoNovaSenha");
const mensagem=document.getElementById("mensagem");
const telefone=document.getElementById("telefone");
const reenviarBtn=document.getElementById("reenviarBtn");

let tokenGerado="";
let tempoExpiracao=120;
let validacaoIdentidade=false;
let tentativasReenvio=0;
const limiteReenvio=5;

metodo.addEventListener("change",()=>{

campoEmail.classList.add("hidden");
campoSMS.classList.add("hidden");
campoToken.classList.add("hidden");
campoNovaSenha.classList.add("hidden");
mensagem.textContent="";
reenviarBtn.classList.add("hidden");

if(metodo.value==="email") campoEmail.classList.remove("hidden");
else if(metodo.value==="sms") campoSMS.classList.remove("hidden");

});

telefone.addEventListener("input",()=>{

let valor=telefone.value.replace(/\D/g,"");

if(valor.length>11) valor=valor.slice(0,11);

if(valor.length>6){
telefone.value=`(${valor.slice(0,2)}) ${valor.slice(2,7)}-${valor.slice(7,11)}`;
}
else if(valor.length>2){
telefone.value=`(${valor.slice(0,2)}) ${valor.slice(2)}`;
}
else{
telefone.value=valor;
}

});

document.getElementById("recuperarForm").addEventListener("submit",(e)=>{
e.preventDefault();
enviarToken();
});

function enviarToken(){

if(metodo.value===""){
mensagem.style.color="red";
mensagem.textContent="Selecione um método de recuperação.";
return;
}

tokenGerado=Math.floor(100000+Math.random()*900000).toString();

campoToken.classList.remove("hidden");
reenviarBtn.classList.remove("hidden");

mensagem.style.color="green";
mensagem.textContent=`Token enviado via ${metodo.value.toUpperCase()}: ${tokenGerado}`;

setTimeout(()=>{
tokenGerado="";
mensagem.style.color="red";
mensagem.textContent="Token expirado. Reenvie o código.";
},tempoExpiracao*1000);

}

reenviarBtn.addEventListener("click",()=>{

if(tentativasReenvio>=limiteReenvio){

reenviarBtn.disabled=true;
mensagem.style.color="red";
mensagem.textContent="Limite de reenvios atingido.";

return;
}

tentativasReenvio++;
enviarToken();

});

document.getElementById("token").addEventListener("input",()=>{

const tokenDigitado=document.getElementById("token").value.trim();

if(tokenDigitado===tokenGerado && tokenGerado!==""){

validacaoIdentidade=true;
campoNovaSenha.classList.remove("hidden");

mensagem.style.color="green";
mensagem.textContent="Token validado! Crie uma nova senha.";

}

});

document.getElementById("novaSenha").addEventListener("input",()=>{

const novaSenha=document.getElementById("novaSenha").value;

if(validacaoIdentidade && novaSenha.length>=8){

mensagem.textContent="Senha redefinida com sucesso!";
mensagem.style.color="green";

setTimeout(()=>{
window.location.href="Login.html";
},2000);

}

});

</script>

</body>
</html>
